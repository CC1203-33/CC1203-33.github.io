<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test - Haoxiang Auto Parts</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #f0f0f0; margin: 0; padding: 20px; }
      #test { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
      #root-wrapper { background: #e0e0e0; padding: 20px; border-radius: 8px; min-height: 100px; }
      .error { color: red; padding: 10px; background: #fee; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="test">
      <h2>HTML Test - If you see this, HTML is working</h2>
      <p>CSS is working too.</p>
    </div>
    <div id="root-wrapper">
      <p>React should render below:</p>
      <div id="root"></div>
    </div>
    <div id="error-log"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-log').innerHTML += 
          '<div class="error"><strong>Error:</strong> ' + e.message + 
          ' at ' + e.filename + ':' + e.lineno + '</div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-log').innerHTML += 
          '<div class="error"><strong>Promise Error:</strong> ' + e.reason + '</div>';
      });
    </script>
    <script type="module" src="./assets/index-M1bMJ0F5.js"></script>
    <link rel="stylesheet" href="./assets/index-59RAFCE8.css">
  </body>
</html>
